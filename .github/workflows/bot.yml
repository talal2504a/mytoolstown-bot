name: Run Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright
          python3 -m playwright install chromium
          sudo apt-get update -qq
          sudo apt-get install -y -qq libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 > /dev/null 2>&1
      - name: Run
        env:
          USER: ${{ secrets.INSTA_USERNAME }}
          PYTHONUNBUFFERED: "1"
        run: |
          sed -i "s/YOUR_USERNAME_HERE/$USER/g" auto-earn-tool/config.json
          cd auto-earn-tool && python3 server_bot.py || true