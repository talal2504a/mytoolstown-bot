name: Run MyToolsTown Bot

on:
  schedule:
    # Har 3 ghante chale ga (free limit 2000 min/month)
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Manually bhi chala sakte ho

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max per run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          python3 -m playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Run Bot
        env:
          INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
        run: |
          # Update config with username from secrets
          python3 -c "
          import json
          with open('auto-earn-tool/config.json', 'r') as f:
              config = json.load(f)
          config['instagram_username'] = '${{ secrets.INSTA_USERNAME }}'
          with open('auto-earn-tool/config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('Config updated!')
          "
          cd auto-earn-tool
          python3 server_bot.py